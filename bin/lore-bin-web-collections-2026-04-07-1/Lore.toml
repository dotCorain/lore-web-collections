# Lore 配置文件
# 用于将 .lore 文件转换为 .html 文件

# 基础链接 URL，用于生成 Lore 链接
# 例如：内部链接会生成为 {link_base}/index/{name}.html
link_base = "https://www.example.com"

# CSS 样式表路径
# 可以是相对路径或绝对 URL
css_url = "https://fleetinglore.github.io/css/style.css"

# 源文件目录（存放 .lore 文件）
# 支持相对路径或绝对路径
from_lore_path = "./examples/src"

# 输出目录（生成 .html 文件）
# 支持相对路径或绝对路径
to_html_path = "./examples/target"